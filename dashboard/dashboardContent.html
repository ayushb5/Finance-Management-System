<div class="container">
  <div class="badgeContainer text-center">
    <span class="badge rounded-pill bg-primary fs-5"
      >Finance Summary Dashboard</span
    >
  </div>

  <div class="row my-4 g-4">
    <div class="col-lg-3">
      <div class="card">
        <div class="card-header text-center">
          <span class="card-title">Total Income</span>
        </div>
        <div class="card-body text-center">
          <span class="fs-4">₹</span>
          <span class="fs-5" id="totalIncome">0</span>
        </div>
      </div>
    </div>
    <div class="col-lg-3">
      <div class="card">
        <div class="card-header text-center">
          <span class="card-title">Total Expense</span>
        </div>
        <div class="card-body text-center">
          <span class="fs-4">₹</span>
          <span class="fs-5" id="totalExpense">0</span>
        </div>
      </div>
    </div>
    <div class="col-lg-3">
      <div class="card">
        <div class="card-header text-center">
          <span class="card-title">Total Balance</span>
        </div>
        <div class="card-body text-center">
          <span class="fs-4">₹</span>
          <span class="fs-5" id="totalBalance">0</span>
        </div>
      </div>
    </div>
    <div class="col-lg-3">
      <div class="card">
        <div class="card-header text-center">
          <span class="card-title">This Month</span>
        </div>
        <div class="card-body text-center">
          <span class="fs-4">₹</span>
          <span class="fs-5" id="thisMonth">0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-header text-center fw-bold fs-5">
      Monthly Financial Summary
    </div>
    <div class="card-body">
      <canvas id="myChart" style="width: 100%; height: 100%"></canvas>
    </div>
  </div>

  <div class="row mt-4 g-4">
    <!-- Top Income Sources -->
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header text-center fw-bold">Top Income Sources</div>
        <div
          class="card-body d-flex justify-content-center"
          style="height: 35vh; min-height: 250px"
        >
          <canvas
            id="incomePieChart"
            style="width: 100%; height: 100%"
          ></canvas>
        </div>
      </div>
    </div>

    <!-- Top Spending Highlights -->
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header text-center fw-bold">
          Top Spending Highlights
        </div>
        <div
          class="card-body d-flex justify-content-center"
          style="height: 35vh; min-height: 250px"
        >
          <canvas
            id="expensePieChart"
            style="width: 100%; height: 100%"
          ></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-header text-center fw-bold">Recent Transactions</div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Type</th>
              <th>Source</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="recentTransactionsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
