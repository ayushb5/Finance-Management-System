<div class="container text-center">
  <h2 class="mb-4">Profile</h2>

  <div class="card d-inline-block text-start">
    <div class="card-body">
      <div class="mb-3 d-flex justify-content-center">
        <div
          class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
          style="width: 70px; height: 70px; font-size: 28px"
          id="firstLetter"
        ></div>
      </div>
      <div class="d-flex gap-2 mb-3">
        <strong>Name:</strong>
        <span id="profileName"></span>
      </div>

      <div class="d-flex gap-2">
        <strong>Email:</strong>
        <span id="profileEmail"></span>
      </div>
    </div>
  </div>

  <div class="buttons mt-5 d-flex justify-content-center gap-3">
    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#editProfile"
    >
      Edit Profile
    </button>
    <button
      class="btn btn-danger"
      data-bs-toggle="modal"
      data-bs-target="#changePass"
    >
      Change Password
    </button>
  </div>

  <!-- Edit profile modal -->
  <div class="modal bg-dark fade" id="editProfile">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">Edit Profile</h4>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3 text-start">
            <label for="name" class="text-start">Name</label>
            <input type="text" id="editName" class="form-control" />
            <span class="text-danger" id="nameError"></span>
          </div>
          <div class="mb-3 text-start">
            <label for="email" class="text-start">Email</label>
            <input type="email" id="editEmail" class="form-control" />
            <span class="text-danger" id="emailError"></span>
          </div>
          <div>
            <button
              class="btn btn-danger"
              data-bs-dismiss="modal"
              onclick="loadProfile()"
            >
              Cancel
            </button>
            <button class="btn btn-success" onclick="editProfile()">
              Update
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password modal -->
  <div class="modal bg-dark fade" id="changePass">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">Change Password</h4>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3 text-start">
            <label for="currentPass" class="text-start">Current Password</label>
            <input type="password" id="currentPass" class="form-control" />
            <span class="text-danger" id="currentPassError"></span>
          </div>
          <div class="mb-3 text-start">
            <label for="newPass" class="text-start">New Password</label>
            <input type="password" id="newPass" class="form-control" />
            <span class="text-danger" id="newPassError"></span>
          </div>
          <div class="mb-3 text-start">
            <label for="confirmNewPass" class="text-start"
              >Confirm Password</label
            >
            <input type="password" id="confirmNewPass" class="form-control" />
            <span class="text-danger" id="confirmNewPassError"></span>
          </div>
          <div>
            <button class="btn btn-danger" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-success" onclick="changePass()">
              Change
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
