<!-- Login Modal -->
<div class="modal fade bg-dark" id="login">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title mx-auto">Login</h3>
        <button
          class="btn-close position-absolute end-0 me-3"
          data-bs-dismiss="modal"
        ></button>
      </div>
      <div class="modal-body d-flex flex-column p-3">
        <div class="mb-2">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="loginEmail" />
        </div>
        <div class="mb-2">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" />
        </div>

        <div
          class="mt-3 d-flex justify-content-between align-items-center flex-nowrap user-select-none"
        >
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a role="button" class="text-decoration-none ms-2"
            >Forgot Password?</a
          >
        </div>

        <button class="btn btn-primary my-4 w-50 mx-auto">Login</button>

        <p class="mt-1 text-center">
          Don't have an account?
          <a
            class="text-decoration-none text-primary"
            role="button"
            data-bs-toggle="modal"
            data-bs-target="#signup"
            >Sign Up</a
          >
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Sign Up Modal -->
<div class="modal fade bg-dark" id="signup">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title mx-auto">Sign Up</h3>
        <button
          class="btn-close position-absolute end-0 me-3"
          data-bs-dismiss="modal"
        ></button>
      </div>
      <div class="modal-body d-flex flex-column p-3">
        <div class="mb-2">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="Name" />
        </div>
        <div class="mb-2">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="signupEmail" />
        </div>
        <div class="mb-2">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="signupPassword" />
        </div>
        <div class="mb-2">
          <label for="confirmPass" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPass" />
        </div>

        <button class="btn btn-primary my-4 w-50 mx-auto">Sign Up</button>

        <p class="mt-1 text-center">
          Already have an account?
          <a
            class="text-decoration-none text-primary"
            role="button"
            data-bs-toggle="modal"
            data-bs-target="#login"
            >Login</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
